<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AnyCals｜小工具</title>
  <meta name="description" content="AnyCals 小工具集合：房貸、BMI、熱量、心率區間、蛋白質。" />
  <style>
    :root{--bg:#f6f7fb;--fg:#111827;--muted:#6b7280;--card:#fff;--border:#e5e7eb;--shadow:0 6px 18px rgba(0,0,0,.06);--r:16px}
    body{margin:0;padding:24px;font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--fg)}
    .wrap{max-width:980px;margin:0 auto}
    header{display:flex;gap:12px;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}
    .brand{font-weight:900;font-size:20px}
    .sub{color:var(--muted);line-height:1.6}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
    a{color:inherit;text-decoration:none}
    .title{font-size:16px;font-weight:900;margin:0 0 6px}
    .desc{color:var(--muted);font-size:13px;line-height:1.6;margin:0}
    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand">AnyCals</div>
        <div class="sub">5 個小工具（離線 HTML）</div>
      </div>
      <div class="sub">版本：2026-02-23</div>
    </header>

    <div class="grid">
      <a class="card" href="./mortgage.html">
        <div class="title">房貸試算器</div>
        <p class="desc">本息均攤 / 本金均攤、可選寬限期、攤還表、CSV。</p>
      </a>
      <a class="card" href="./bmi.html">
        <div class="title">BMI &amp; 體重區間</div>
        <p class="desc">BMI、理想體重區間、基礎建議。</p>
      </a>
      <a class="card" href="./calories.html">
        <div class="title">TDEE 熱量估算</div>
        <p class="desc">BMR/TDEE、維持/減脂/增肌熱量區間。</p>
      </a>
      <a class="card" href="./heart-rate.html">
        <div class="title">心率區間（Zone 1–5）</div>
        <p class="desc">%HRmax 與 Karvonen（HRR%）兩種算法。</p>
      </a>
      <a class="card" href="./protein.html">
        <div class="title">蛋白質需求量</div>
        <p class="desc">依目標與訓練頻率估算每日蛋白質。</p>
      </a>
    </div>
  </div>
</body>
</html>
