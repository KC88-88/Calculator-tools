<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="pageTitle">房貸試算器｜月付金、總利息、攤還表｜AnyCals</title>
  <meta name="description" id="pageDesc" content="AnyCals 房貸試算器：支援本息均攤 / 本金均攤，可設定寬限期（只繳息），輸出月付金、總利息與攤還表。" />

  <style>
    :root{
      --bg:#f6f7fb; --fg:#111827; --muted:#6b7280;
      --card:#fff; --border:#e5e7eb; --shadow:0 6px 18px rgba(0,0,0,.06);
      --radius:16px;
    }
    body{margin:0;padding:24px;font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--fg)}
    .wrap{max-width:1100px;margin:0 auto}
    header{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
    .title{font-weight:900;font-size:22px;letter-spacing:.3px;margin:0}
    .sub{color:var(--muted);line-height:1.6;margin-top:6px}
    .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .btn{border:1px solid var(--border);background:var(--card);border-radius:12px;padding:8px 10px;cursor:pointer;box-shadow:var(--shadow);font-size:14px}
    .btn.primary{background:var(--fg);color:#fff;border-color:transparent}
    .pill{
      display:inline-block;background:var(--card);border:1px solid var(--border);
      border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;
      box-shadow:var(--shadow);text-decoration:none;color:var(--fg)
    }

    .grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    h2{margin:0 0 10px;font-size:16px}
    label{font-size:13px;color:#374151}
    input,select{
      width:100%;padding:10px 12px;border:1px solid #d6d9e0;border-radius:12px;font-size:15px;background:#fff;outline:none
    }
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .note{color:var(--muted);font-size:12px;line-height:1.7;margin-top:10px}

    .metric{background:#f3f4f6;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
    .metric .k{font-size:12px;color:var(--muted)}
    .metric .v{font-size:20px;font-weight:900;margin-top:6px}

    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .tab{border:1px solid var(--border);background:#fff;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:900;cursor:pointer}
    .tab.active{background:var(--fg);color:#fff;border-color:transparent}

    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}
    th,td{padding:10px 10px;border-bottom:1px solid var(--border);text-align:right;font-size:13px}
    th{text-align:right;background:#fafafa;color:#374151;font-weight:900}
    td:first-child, th:first-child{text-align:center}
    tr:last-child td{border-bottom:none}
    .tableWrap{max-height:520px;overflow:auto;border-radius:12px;border:1px solid var(--border)}
    .muted{color:var(--muted);font-size:12px;line-height:1.7;margin-top:10px}

    @media(max-width:980px){
      .grid{grid-template-columns:1fr}
      .right{justify-content:flex-start}
      .form{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1 class="title" data-i18n="h1">房貸試算器</h1>
        <div class="sub" data-i18n="sub">輸出月付金、總利息與攤還表；支援本息均攤 / 本金均攤與寬限期。</div>
      </div>
      <div class="right">
        <a class="pill" href="/" data-i18n="back">回首頁</a>
        <button class="btn" onclick="setLang('zh')">中文</button>
        <button class="btn" onclick="setLang('en')">EN</button>
      </div>
    </header>

    <div class="grid">
      <!-- Inputs -->
      <div class="card">
        <h2 data-i18n="inputTitle">輸入</h2>

        <div class="form">
          <div class="full">
            <label data-i18n="planLbl">還款方式</label>
            <select id="plan">
              <option value="annuity" data-i18n-opt="planA">本息均攤（每月固定）</option>
              <option value="equal_principal" data-i18n-opt="planB">本金均攤（逐月遞減）</option>
            </select>
          </div>

          <div>
            <label data-i18n="amountLbl">貸款金額</label>
            <input id="amount" type="number" step="1" placeholder="例如 10000000">
          </div>
          <div>
            <label data-i18n="rateLbl">年利率（%）</label>
            <input id="rate" type="number" step="0.01" placeholder="例如 2.10">
          </div>

          <div>
            <label data-i18n="yearsLbl">年限（年）</label>
            <input id="years" type="number" step="1" placeholder="例如 30">
          </div>
          <div>
            <label data-i18n="graceLbl">寬限期（月，可選）</label>
            <input id="grace" type="number" step="1" placeholder="例如 24">
          </div>

          <div class="full">
            <label data-i18n="startLbl">起算月份（可選）</label>
            <input id="start" type="month">
            <div class="note" data-i18n="startHint">若不填，攤還表仍會用「第 1 期、第 2 期…」表示。</div>
          </div>

          <div class="full actions">
            <button class="btn primary" onclick="calc()" data-i18n="calcBtn">計算</button>
            <button class="btn" onclick="resetAll()" data-i18n="resetBtn">清除</button>
            <button class="btn" onclick="downloadCSV()" data-i18n="csvBtn">下載 CSV</button>
          </div>

          <div class="note" data-i18n="methodNote">
            ※ 寬限期期間「只繳息」且本金不減；寬限期結束後，以剩餘期數重新計算（利率不變）。
          </div>
        </div>
      </div>

      <!-- Summary -->
      <div class="card">
        <h2 data-i18n="resultTitle">結果</h2>

        <div class="metric">
          <div class="k" data-i18n="m1">每月應繳（首期）</div>
          <div class="v" id="mPay">—</div>
        </div>

        <div class="metric">
          <div class="k" data-i18n="m2">總利息</div>
          <div class="v" id="tInt">—</div>
        </div>

        <div class="metric">
          <div class="k" data-i18n="m3">本息合計</div>
          <div class="v" id="tPay">—</div>
        </div>

        <div class="metric">
          <div class="k" data-i18n="m4">期數</div>
          <div class="v" id="nPay">—</div>
        </div>

        <div class="muted" data-i18n="disc">
          ※ 試算僅供參考。實際月付金可能因銀行計息規則、天數基準、費用與條款而不同。
        </div>
      </div>
    </div>

    <!-- Amortization -->
    <div class="card" style="margin-top:14px">
      <div class="tabs">
        <button class="tab active" id="tabAll" onclick="setTableMode('all')" data-i18n="tabAll">全部期數</button>
        <button class="tab" id="tab12" onclick="setTableMode('12')" data-i18n="tab12">前 12 期</button>
        <button class="tab" id="tabGrace" onclick="setTableMode('grace')" data-i18n="tabGrace">寬限期</button>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="thP">期數</th>
              <th data-i18n="thDate">月份</th>
              <th data-i18n="thPay">應繳</th>
              <th data-i18n="thPrin">本金</th>
              <th data-i18n="thInt">利息</th>
              <th data-i18n="thBal">剩餘本金</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" style="text-align:center;color:#6b7280;padding:18px" data-i18n="empty">請先計算以產生攤還表。</td></tr>
          </tbody>
        </table>
      </div>

      <div class="muted" id="tableHint"></div>
    </div>
  </div>

<script>
  // -------- i18n --------
  let lang = "zh";
  const dict = {
    zh:{
      seoTitle:"房貸試算器｜月付金、總利息、攤還表｜AnyCals",
      seoDesc:"AnyCals 房貸試算器：支援本息均攤 / 本金均攤，可設定寬限期（只繳息），輸出月付金、總利息與攤還表。",
      h1:"房貸試算器",
      sub:"輸出月付金、總利息與攤還表；支援本息均攤 / 本金均攤與寬限期。",
      back:"回首頁",
      inputTitle:"輸入",
      planLbl:"還款方式",
      planA:"本息均攤（每月固定）",
      planB:"本金均攤（逐月遞減）",
      amountLbl:"貸款金額",
      rateLbl:"年利率（%）",
      yearsLbl:"年限（年）",
      graceLbl:"寬限期（月，可選）",
      startLbl:"起算月份（可選）",
      startHint:"若不填，攤還表仍會用「第 1 期、第 2 期…」表示。",
      calcBtn:"計算",
      resetBtn:"清除",
      csvBtn:"下載 CSV",
      methodNote:"※ 寬限期期間「只繳息」且本金不減；寬限期結束後，以剩餘期數重新計算（利率不變）。",
      resultTitle:"結果",
      m1:"每月應繳（首期）",
      m2:"總利息",
      m3:"本息合計",
      m4:"期數",
      disc:"※ 試算僅供參考。實際月付金可能因銀行計息規則、天數基準、費用與條款而不同。",
      tabAll:"全部期數",
      tab12:"前 12 期",
      tabGrace:"寬限期",
      thP:"期數",
      thDate:"月份",
      thPay:"應繳",
      thPrin:"本金",
      thInt:"利息",
      thBal:"剩餘本金",
      empty:"請先計算以產生攤還表。",
      hintAll:"顯示全部期數。",
      hint12:"顯示前 12 期（若不足 12 期則顯示全部）。",
      hintGrace:"顯示寬限期期間（若未設定寬限期則顯示空）。",
      errBase:"請輸入有效的貸款金額、年利率與年限。",
      errGrace:"寬限期不可大於總期數。"
    },
    en:{
      seoTitle:"Mortgage Calculator | Payment, Interest, Amortization | AnyCals",
      seoDesc:"AnyCals mortgage calculator: annuity or equal principal, optional grace period (interest-only). Outputs monthly payment, total interest, and amortization schedule.",
      h1:"Mortgage Calculator",
      sub:"Monthly payment, total interest, and amortization schedule. Supports annuity / equal principal and grace period.",
      back:"Home",
      inputTitle:"Inputs",
      planLbl:"Repayment plan",
      planA:"Annuity (fixed monthly payment)",
      planB:"Equal principal (payment decreases)",
      amountLbl:"Loan amount",
      rateLbl:"Annual rate (%)",
      yearsLbl:"Term (years)",
      graceLbl:"Grace period (months, optional)",
      startLbl:"Start month (optional)",
      startHint:"If omitted, the schedule shows installment number only.",
      calcBtn:"Calculate",
      resetBtn:"Reset",
      csvBtn:"Download CSV",
      methodNote:"* During grace period, you pay interest only (principal unchanged). After grace, payment is recalculated over remaining months.",
      resultTitle:"Results",
      m1:"Monthly payment (first)",
      m2:"Total interest",
      m3:"Total paid",
      m4:"Payments (months)",
      disc:"* For reference only. Actual payments may vary by bank rules, day-count convention, fees, and terms.",
      tabAll:"All",
      tab12:"First 12",
      tabGrace:"Grace",
      thP:"#",
      thDate:"Month",
      thPay:"Payment",
      thPrin:"Principal",
      thInt:"Interest",
      thBal:"Balance",
      empty:"Run calculation to generate the schedule.",
      hintAll:"Showing all payments.",
      hint12:"Showing the first 12 payments (or all if fewer).",
      hintGrace:"Showing grace-period rows (empty if no grace period).",
      errBase:"Please enter a valid loan amount, annual rate, and term.",
      errGrace:"Grace period cannot exceed total months."
    }
  };

  function setLang(l){
    lang = l;
    document.documentElement.lang = (l==="zh") ? "zh-Hant-TW" : "en";
    document.getElementById("pageTitle").textContent = dict[l].seoTitle;
    document.getElementById("pageDesc").setAttribute("content", dict[l].seoDesc);
    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const k = el.dataset.i18n;
      if(dict[l][k] !== undefined) el.textContent = dict[l][k];
    });
    document.querySelectorAll("[data-i18n-opt]").forEach(el=>{
      const k = el.dataset.i18nOpt;
      if(dict[l][k] !== undefined) el.textContent = dict[l][k];
    });
    // keep table hint synced
    updateTableHint();
    // re-render existing table with current language formatting (numbers unchanged)
    renderTable();
  }

  // -------- calculation core --------
  let schedule = []; // {idx, dateStr, pay, prin, intr, bal, isGrace}
  let tableMode = "all"; // all | 12 | grace

  function fmtMoney(n){
    if(!isFinite(n)) return "—";
    return Math.round(n).toLocaleString(undefined);
  }

  function monthAdd(yyyyMm, add){
    // yyyyMm like "2026-02"
    const [y, m] = yyyyMm.split("-").map(Number);
    const d = new Date(y, (m-1) + add, 1);
    const yy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,"0");
    return `${yy}-${mm}`;
  }

  function annuityPayment(P, r, n){
    // P principal, r monthly rate, n months
    if(n <= 0) return 0;
    if(r === 0) return P / n;
    const a = Math.pow(1+r, n);
    return P * (r * a) / (a - 1);
  }

  function calc(){
    const P0 = Number(document.getElementById("amount").value);
    const annualRatePct = Number(document.getElementById("rate").value);
    const years = Number(document.getElementById("years").value);
    const grace = Number(document.getElementById("grace").value || 0);
    const plan = document.getElementById("plan").value;
    const start = document.getElementById("start").value; // "YYYY-MM" or ""

    const nTotal = Math.round(years * 12);
    const g = Math.max(0, Math.round(grace));

    if(!(P0 > 0) || !(annualRatePct >= 0) || !(nTotal > 0)){
      alert(dict[lang].errBase);
      return;
    }
    if(g > nTotal){
      alert(dict[lang].errGrace);
      return;
    }

    const r = (annualRatePct/100) / 12;
    schedule = [];

    let bal = P0;
    let totalInterest = 0;
    let totalPaid = 0;

    // 1) grace period (interest-only)
    for(let i=1; i<=g; i++){
      const intr = bal * r;
      const prin = 0;
      const pay = intr;
      totalInterest += intr;
      totalPaid += pay;

      schedule.push({
        idx:i,
        dateStr: start ? monthAdd(start, i-1) : "",
        pay, prin, intr,
        bal,
        isGrace:true
      });
    }

    // 2) after grace
    const nRemain = nTotal - g;
    if(nRemain > 0){
      if(plan === "annuity"){
        const payFixed = annuityPayment(bal, r, nRemain);
        for(let k=1; k<=nRemain; k++){
          const idx = g + k;
          const intr = bal * r;
          let prin = payFixed - intr;

          // guard rounding at last month
          if(k === nRemain){
            prin = bal; // close out
          }else{
            prin = Math.max(0, prin);
          }

          const pay = intr + prin;
          bal = bal - prin;

          totalInterest += intr;
          totalPaid += pay;

          schedule.push({
            idx,
            dateStr: start ? monthAdd(start, idx-1) : "",
            pay, prin, intr,
            bal: Math.max(0, bal),
            isGrace:false
          });
        }
      }else{ // equal principal
        const prinFixed = bal / nRemain;
        for(let k=1; k<=nRemain; k++){
          const idx = g + k;
          const intr = bal * r;
          let prin = (k === nRemain) ? bal : prinFixed; // last month close out
          const pay = intr + prin;
          bal = bal - prin;

          totalInterest += intr;
          totalPaid += pay;

          schedule.push({
            idx,
            dateStr: start ? monthAdd(start, idx-1) : "",
            pay, prin, intr,
            bal: Math.max(0, bal),
            isGrace:false
          });
        }
      }
    }

    // summary
    document.getElementById("nPay").textContent = `${nTotal}`;
    document.getElementById("tInt").textContent = fmtMoney(totalInterest);
    document.getElementById("tPay").textContent = fmtMoney(totalPaid);

    // first payment shown as first row pay (if any)
    const first = schedule[0];
    document.getElementById("mPay").textContent = first ? fmtMoney(first.pay) : "—";

    // table
    setTableMode("all"); // reset to all after calc
    renderTable();
    updateTableHint();
  }

  // -------- table rendering --------
  function setTableMode(mode){
    tableMode = mode;
    document.getElementById("tabAll").classList.toggle("active", mode==="all");
    document.getElementById("tab12").classList.toggle("active", mode==="12");
    document.getElementById("tabGrace").classList.toggle("active", mode==="grace");
    renderTable();
    updateTableHint();
  }

  function updateTableHint(){
    const hintEl = document.getElementById("tableHint");
    if(tableMode === "all") hintEl.textContent = dict[lang].hintAll;
    else if(tableMode === "12") hintEl.textContent = dict[lang].hint12;
    else hintEl.textContent = dict[lang].hintGrace;
  }

  function filteredSchedule(){
    if(schedule.length === 0) return [];
    if(tableMode === "all") return schedule;
    if(tableMode === "12") return schedule.slice(0, Math.min(12, schedule.length));
    // grace
    return schedule.filter(x=>x.isGrace);
  }

  function renderTable(){
    const tbody = document.getElementById("tbody");
    const rows = filteredSchedule();

    if(schedule.length === 0){
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:18px">${dict[lang].empty}</td></tr>`;
      return;
    }

    if(rows.length === 0){
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:18px">—</td></tr>`;
      return;
    }

    const hasDate = !!schedule.find(x=>x.dateStr);
    // If no start month, show "—" in month column to avoid confusion
    tbody.innerHTML = rows.map(x=>{
      const dateText = hasDate ? (x.dateStr || "—") : "—";
      return `
        <tr>
          <td>${x.idx}</td>
          <td style="text-align:center">${dateText}</td>
          <td>${fmtMoney(x.pay)}</td>
          <td>${fmtMoney(x.prin)}</td>
          <td>${fmtMoney(x.intr)}</td>
          <td>${fmtMoney(x.bal)}</td>
        </tr>
      `;
    }).join("");
  }

  // -------- CSV export --------
  function downloadCSV(){
    if(!schedule.length){
      alert(lang==="zh" ? "請先計算後再下載。" : "Please calculate first, then download.");
      return;
    }
    const hasDate = !!schedule.find(x=>x.dateStr);
    const headersZh = ["期數","月份","應繳","本金","利息","剩餘本金","是否寬限期"];
    const headersEn = ["No.","Month","Payment","Principal","Interest","Balance","Grace"];
    const headers = (lang==="zh") ? headersZh : headersEn;

    const lines = [];
    lines.push(headers.join(","));

    schedule.forEach(x=>{
      const dateText = hasDate ? (x.dateStr || "") : "";
      const row = [
        x.idx,
        `"${dateText}"`,
        Math.round(x.pay),
        Math.round(x.prin),
        Math.round(x.intr),
        Math.round(x.bal),
        x.isGrace ? 1 : 0
      ];
      lines.push(row.join(","));
    });

    const blob = new Blob(["\uFEFF" + lines.join("\n")], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (lang==="zh") ? "mortgage_schedule.csv" : "mortgage_schedule.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function resetAll(){
    document.getElementById("plan").value = "annuity";
    document.getElementById("amount").value = "";
    document.getElementById("rate").value = "";
    document.getElementById("years").value = "";
    document.getElementById("grace").value = "";
    document.getElementById("start").value = "";
    schedule = [];
    document.getElementById("mPay").textContent = "—";
    document.getElementById("tInt").textContent = "—";
    document.getElementById("tPay").textContent = "—";
    document.getElementById("nPay").textContent = "—";
    renderTable();
    updateTableHint();
  }

  // init
  updateTableHint();
</script>
</body>
</html>
