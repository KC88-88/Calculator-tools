<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BMI 與每日熱量計算器｜BMI、BMR、TDEE 一次算清楚｜AnyCals</title>
  <meta name="description" content="輸入身高、體重、年齡與活動量，快速計算 BMI、基礎代謝率（BMR）與每日熱量需求（TDEE）。適合減脂、維持體態或增肌規劃。" />
  <style>
    body{margin:0;padding:24px;font-family:system-ui,-apple-system,'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#f6f7fb;color:#111827}
    .wrap{max-width:980px;margin:0 auto}
    h1{margin:0 0 8px}
    .sub{color:#6b7280;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{font-size:13px;color:#374151}
    input,select{width:100%;padding:10px 12px;border:1px solid #d6d9e0;border-radius:12px;font-size:15px}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:10px;margin-top:12px}
    button{padding:10px 14px;border:0;border-radius:12px;font-size:15px;cursor:pointer}
    .primary{background:#111827;color:#fff}
    .ghost{background:#f3f4f6}
    .metric{background:#f3f4f6;border-radius:12px;padding:12px;border:1px solid #e5e7eb;margin-bottom:10px}
    .metric .k{font-size:12px;color:#6b7280}
    .metric .v{font-size:20px;font-weight:800;margin-top:6px}
    .note{font-size:13px;color:#6b7280;line-height:1.6}
    @media(max-width:860px){.grid{grid-template-columns:1fr}.form{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>BMI 與每日熱量計算器</h1>
    <div class="sub">快速試算 BMI、基礎代謝率（BMR）與每日熱量需求（TDEE）。</div>

    <div class="grid">
      <div class="card">
        <h3>輸入資料</h3>
        <div class="form">
          <div>
            <label>身高（cm）</label>
            <input id="h" type="number" placeholder="例如 170">
          </div>
          <div>
            <label>體重（kg）</label>
            <input id="w" type="number" placeholder="例如 65">
          </div>
          <div>
            <label>年齡</label>
            <input id="age" type="number" placeholder="例如 30">
          </div>
          <div>
            <label>性別</label>
            <select id="sex">
              <option value="male">男性</option>
              <option value="female">女性</option>
            </select>
          </div>
          <div class="full">
            <label>活動量</label>
            <select id="act">
              <option value="1.2">久坐（幾乎不運動）</option>
              <option value="1.375">輕度活動（每週 1–3 天）</option>
              <option value="1.55">中度活動（每週 3–5 天）</option>
              <option value="1.725">高度活動（每週 6–7 天）</option>
              <option value="1.9">非常高（體力勞動或專業運動）</option>
            </select>
          </div>
          <div class="full actions">
            <button class="primary" onclick="calc()">計算</button>
            <button class="ghost" onclick="resetAll()">清除</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>計算結果</h3>
        <div class="metric">
          <div class="k">BMI</div>
          <div class="v" id="bmi">—</div>
          <div class="note" id="bmiNote"></div>
        </div>
        <div class="metric">
          <div class="k">BMR（基礎代謝）</div>
          <div class="v" id="bmr">—</div>
          <div class="note">使用 Mifflin-St Jeor 公式估算</div>
        </div>
        <div class="metric">
          <div class="k">TDEE（每日熱量需求）</div>
          <div class="v" id="tdee">—</div>
          <div class="note">= BMR × 活動係數</div>
        </div>
        <div class="note">
          ※ 試算結果僅供參考，實際熱量需求會受體組成、運動強度、作息影響。<br/>
          ※ 若有醫療或體重管理需求，請諮詢專業人員。
        </div>
      </div>
    </div>
  </div>

  <script>
    function calc(){
      const h = Number(document.getElementById('h').value) / 100;
      const w = Number(document.getElementById('w').value);
      const age = Number(document.getElementById('age').value);
      const sex = document.getElementById('sex').value;
      const act = Number(document.getElementById('act').value);

      if(!h || !w || !age){ alert('請完整輸入身高、體重與年齡'); return; }

      const bmi = w / (h*h);
      let bmiText = '';
      if(bmi < 18.5) bmiText = '體重過輕';
      else if(bmi < 24) bmiText = '正常範圍';
      else if(bmi < 27) bmiText = '過重';
      else bmiText = '肥胖';

      const bmr = sex === 'male'
        ? 10*w + 6.25*(h*100) - 5*age + 5
        : 10*w + 6.25*(h*100) - 5*age - 161;

      const tdee = bmr * act;

      document.getElementById('bmi').textContent = bmi.toFixed(1);
      document.getElementById('bmiNote').textContent = bmiText;
      document.getElementById('bmr').textContent = Math.round(bmr) + ' kcal/day';
      document.getElementById('tdee').textContent = Math.round(tdee) + ' kcal/day';
    }

    function resetAll(){
      ['h','w','age'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('bmi').textContent='—';
      document.getElementById('bmiNote').textContent='';
      document.getElementById('bmr').textContent='—';
      document.getElementById('tdee').textContent='—';
    }
  </script>
</body>
</html>
