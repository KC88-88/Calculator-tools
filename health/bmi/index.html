<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title id="pageTitle">BMI＆每日熱量計算器｜BMI、BMR、TDEE｜AnyCals</title>
  <meta name="description" id="pageDesc" content="AnyCals BMI＆每日熱量計算器：輸入身高、體重、年齡與活動量，估算 BMI、BMR 與 TDEE，提供每日熱量建議。支援中英切換。" />

  <style>
    :root{
      --bg:#f6f7fb; --fg:#111827; --muted:#6b7280;
      --card:#fff; --border:#e5e7eb; --shadow:0 6px 18px rgba(0,0,0,.06);
      --radius:16px;
    }
    body{margin:0;padding:24px;font-family:system-ui,-apple-system,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--fg)}
    .wrap{max-width:980px;margin:0 auto}
    header{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;justify-content:space-between;margin-bottom:12px}
    .title{font-weight:900;font-size:22px;letter-spacing:.3px;margin:0}
    .sub{color:var(--muted);line-height:1.6;margin-top:6px}
    .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      display:inline-block;background:var(--card);border:1px solid var(--border);
      border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;
      box-shadow:var(--shadow);text-decoration:none;color:var(--fg)
    }
    .btn{border:1px solid var(--border);background:var(--card);border-radius:12px;padding:8px 10px;cursor:pointer;box-shadow:var(--shadow);font-size:14px}

    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    h2{margin:0 0 10px;font-size:16px}
    label{font-size:13px;color:#374151}
    input,select{
      width:100%;padding:10px 12px;border:1px solid #d6d9e0;border-radius:12px;font-size:15px;background:#fff;outline:none
    }
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .note{color:var(--muted);font-size:12px;line-height:1.7;margin-top:10px}

    .metric{background:#f3f4f6;border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
    .metric .k{font-size:12px;color:var(--muted)}
    .metric .v{font-size:20px;font-weight:900;margin-top:6px}

    .triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .numInput{width:100%}

    @media(max-width:860px){.grid{grid-template-columns:1fr}}
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1 class="title" data-i18n="h1">BMI＆每日熱量計算器</h1>
        <div class="sub" data-i18n="sub">計算 BMI、BMR 與 TDEE，估算每日熱量需求。</div>
      </div>
      <div class="right">
        <a class="pill" href="/" data-i18n="home">回首頁</a>
        <a class="pill" id="contactLink" href="#" data-i18n="contact">聯繫我</a>
        <button class="btn" onclick="setLang('zh')">中文</button>
        <button class="btn" onclick="setLang('en')">EN</button>
      </div>
    </header>

    <div class="grid">
      <!-- Inputs -->
      <div class="card">
        <h2 data-i18n="inputTitle">輸入</h2>

        <div class="full triple">
          <div>
            <label data-i18n="heightLbl">身高（cm）</label>
            <input id="height" class="numInput" type="number" step="0.1" placeholder="例如 170">
          </div>
          <div>
            <label data-i18n="weightLbl">體重（kg）</label>
            <input id="weight" class="numInput" type="number" step="0.1" placeholder="例如 65">
          </div>

          <div>
            <label data-i18n="ageLbl">年齡</label>
            <input id="age" class="numInput" type="number" step="1" placeholder="例如 30">
          </div>
          <div>
            <label data-i18n="sexLbl">生理性別</label>
            <select id="sex">
              <option value="male" data-i18n-opt="male">男性</option>
              <option value="female" data-i18n-opt="female">女性</option>
            </select>
          </div>

          <div class="full">
            <label data-i18n="activityLbl">活動量</label>
            <select id="activity">
              <option value="1.2" data-i18n-opt="act1">久坐（幾乎不運動）</option>
              <option value="1.375" data-i18n-opt="act2">輕度活動（每週 1–3 次）</option>
              <option value="1.55" data-i18n-opt="act3">中度活動（每週 3–5 次）</option>
              <option value="1.725" data-i18n-opt="act4">高度活動（每週 6–7 次）</option>
              <option value="1.9" data-i18n-opt="act5">非常高（勞力型工作 / 運動員）</option>
            </select>
          </div>

          <div class="full actions">
            <button class="btn" onclick="calc()" data-i18n="calcBtn">計算</button>
            <button class="btn" onclick="resetAll()" data-i18n="resetBtn">清除</button>
          </div>

          <div class="note" data-i18n="methodNote">
            ※ BMR 採用 Mifflin–St Jeor 公式；TDEE = BMR × 活動係數。
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="card">
        <h2 data-i18n="resultTitle">結果</h2>

        <div class="metric">
          <div class="k">BMI</div>
          <div class="v" id="bmiV">—</div>
        </div>

        <div class="metric">
          <div class="k">BMR</div>
          <div class="v" id="bmrV">—</div>
        </div>

        <div class="metric">
          <div class="k">TDEE</div>
          <div class="v" id="tdeeV">—</div>
        </div>

        <div class="note" id="bmiCat">—</div>
      </div>
    </div>
  </div>

<script>
  const contactEmail = "anycals.contact@gmail.com";
  let lang = "zh";

  function updateContactLink(){
    const subj = (lang === 'zh') ? "AnyCals 聯繫" : "AnyCals Contact";
    const body = (lang === 'zh')
      ? "想詢問：\n\n（1）工具名稱：BMI＆每日熱量\n（2）想算的內容：\n（3）期望輸出：\n\n"
      : "I'd like to ask about:\n\n(1) Tool: BMI & Daily Calories\n(2) What to calculate:\n(3) Expected output:\n\n";
    document.getElementById('contactLink').href =
      `mailto:${encodeURIComponent(contactEmail)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  }

  const dict = {
    zh:{
      seoTitle:"BMI＆每日熱量計算器｜BMI、BMR、TDEE｜AnyCals",
      seoDesc:"AnyCals BMI＆每日熱量計算器：輸入身高、體重、年齡與活動量，估算 BMI、BMR 與 TDEE。",
      h1:"BMI＆每日熱量計算器",
      sub:"計算 BMI、BMR 與 TDEE，估算每日熱量需求。",
      home:"回首頁",
      contact:"聯繫我",
      inputTitle:"輸入",
      heightLbl:"身高（cm）",
      weightLbl:"體重（kg）",
      ageLbl:"年齡",
      sexLbl:"生理性別",
      male:"男性",
      female:"女性",
      activityLbl:"活動量",
      act1:"久坐（幾乎不運動）",
      act2:"輕度活動（每週 1–3 次）",
      act3:"中度活動（每週 3–5 次）",
      act4:"高度活動（每週 6–7 次）",
      act5:"非常高（勞力型工作 / 運動員）",
      calcBtn:"計算",
      resetBtn:"清除",
      methodNote:"※ BMR 採用 Mifflin–St Jeor 公式；TDEE = BMR × 活動係數。",
      resultTitle:"結果"
    },
    en:{
      seoTitle:"BMI & Daily Calories Calculator | BMI, BMR, TDEE | AnyCals",
      seoDesc:"AnyCals BMI & Daily Calories calculator: compute BMI, BMR, and TDEE from height, weight, age, and activity level.",
      h1:"BMI & Daily Calories Calculator",
      sub:"Calculate BMI, BMR, and TDEE to estimate daily calorie needs.",
      home:"Home",
      contact:"Contact",
      inputTitle:"Inputs",
      heightLbl:"Height (cm)",
      weightLbl:"Weight (kg)",
      ageLbl:"Age",
      sexLbl:"Sex",
      male:"Male",
      female:"Female",
      activityLbl:"Activity level",
      act1:"Sedentary",
      act2:"Light (1–3 days/week)",
      act3:"Moderate (3–5 days/week)",
      act4:"High (6–7 days/week)",
      act5:"Very high (athlete/manual labor)",
      calcBtn:"Calculate",
      resetBtn:"Reset",
      methodNote:"* BMR uses the Mifflin–St Jeor equation; TDEE = BMR × activity factor.",
      resultTitle:"Results"
    }
  };

  function setLang(l){
    lang = l;
    document.documentElement.lang = (l==="zh") ? "zh-Hant-TW" : "en";
    document.getElementById("pageTitle").textContent = dict[l].seoTitle;
    document.getElementById("pageDesc").setAttribute("content", dict[l].seoDesc);

    document.querySelectorAll("[data-i18n]").forEach(el=>{
      const k = el.dataset.i18n;
      if(dict[l][k] !== undefined) el.textContent = dict[l][k];
    });
    document.querySelectorAll("[data-i18n-opt]").forEach(el=>{
      const k = el.dataset.i18nOpt;
      if(dict[l][k] !== undefined) el.textContent = dict[l][k];
    });

    updateContactLink();
  }

  function calc(){
    const h = Number(height.value);
    const w = Number(weight.value);
    const a = Number(age.value);
    const sex = sex.value;
    const act = Number(activity.value);

    if(!(h>0) || !(w>0) || !(a>0)){
      alert(lang==="zh" ? "請輸入有效的身高、體重與年齡" : "Please enter valid height, weight, and age.");
      return;
    }

    const bmi = w / Math.pow(h/100, 2);
    const bmr = (sex==="male")
      ? (10*w + 6.25*h - 5*a + 5)
      : (10*w + 6.25*h - 5*a - 161);
    const tdee = bmr * act;

    bmiV.textContent = bmi.toFixed(1);
    bmrV.textContent = Math.round(bmr).toLocaleString();
    tdeeV.textContent = Math.round(tdee).toLocaleString();

    // BMI category (simple WHO bands)
    let catZh="", catEn="";
    if(bmi < 18.5){ catZh="體重過輕"; catEn="Underweight"; }
    else if(bmi < 24){ catZh="正常範圍"; catEn="Normal range"; }
    else if(bmi < 27){ catZh="過重"; catEn="Overweight"; }
    else { catZh="肥胖"; catEn="Obese"; }

    bmiCat.textContent = (lang==="zh") ? `BMI 分類：${catZh}` : `BMI Category: ${catEn}`;
  }

  function resetAll(){
    height.value = "";
    weight.value = "";
    age.value = "";
    bmiV.textContent = "—";
    bmrV.textContent = "—";
    tdeeV.textContent = "—";
    bmiCat.textContent = "—";
  }

  // init
  updateContactLink();
</script>
</body>
</html>
